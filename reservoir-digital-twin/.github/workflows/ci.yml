name: CI
on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: reservoir
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: reservoir_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U reservoir -d reservoir_db -h localhost -p 5432
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        cd reservoir-digital-twin/services/api
        pip install -r requirements.txt
        pip install pytest pytest-cov httpx
    - name: Run linter
      run: |
        pip install ruff
        cd reservoir-digital-twin/services/api
        ruff check . --exit-zero
    - name: Type check
      run: |
        pip install mypy
        cd reservoir-digital-twin/services/api
        mypy . --ignore-missing-imports --exit-zero || true
    - name: Run tests
      run: |
        cd reservoir-digital-twin/services/api
        pytest --cov=. --cov-report=xml --exit-zero || true

  build-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: reservoir-digital-twin/apps/frontend/pnpm-lock.yaml
    - name: Install pnpm
      run: npm install -g pnpm
    - name: Install dependencies
      working-directory: reservoir-digital-twin/apps/frontend
      run: pnpm install
    - name: Lint
      working-directory: reservoir-digital-twin/apps/frontend
      run: pnpm lint || true
    - name: Type check
      working-directory: reservoir-digital-twin/apps/frontend
      run: pnpm typecheck || true
    - name: Build
      working-directory: reservoir-digital-twin/apps/frontend
      run: pnpm build

  deploy:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
    - name: Deploy placeholder
      run: |
        echo "Deploy step would go here"
        echo "Build completed successfully"
