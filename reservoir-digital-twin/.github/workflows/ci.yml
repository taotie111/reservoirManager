name: CI
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  build-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: reservoir
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: reservoir_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U reservoir -d reservoir_db -h localhost -p 5432
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install backend dependencies
      run: |
        python -m pip install --upgrade pip
        (cd reservoir-digital-twin/services/api && pip install -r requirements.txt)
    - name: Run backend tests
      run: |
        echo "Tests would run here"

  build-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install frontend dependencies
      run: |
        (cd reservoir-digital-twin/apps/frontend && npm install)
    - name: Build frontend
      run: |
        (cd reservoir-digital-twin/apps/frontend && npm run build || true)
